name: Build VS Code Extension

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile tests
        run: npm run compile-tests

      - name: Build extension (production)
        run: npm run package

      - name: Upload build output
        uses: actions/upload-artifact@v6
        with:
          name: vscode-extension-dist
          path: |
            dist/
            lib/
            package.json
            README.md
            CHANGELOG.md
          if-no-files-found: error
